  <title id="t4">Stop oral intake if choking signs</title>
  <rect width="640" height="360" fill="#0f1f1c"/>
  <rect x="24" y="24" width="592" height="312" rx="18" fill="#16302a" stroke="rgba(238,246,242,0.12)"/>
  <text x="48" y="64" fill="#f0d5a8" font-family="Georgia, serif" font-size="22" font-weight="700">Stop food &amp; drink if choking signs</text>
  <rect x="120" y="130" width="90" height="110" rx="12" fill="rgba(240,213,168,0.25)" stroke="#f0d5a8"/>
