<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="t3">
  <title id="t3">Sit upright for eating and drinking</title>
  <rect width="640" height="360" fill="#0f1f1c"/>
  <rect x="24" y="24" width="592" height="312" rx="18" fill="#16302a" stroke="rgba(238,246,242,0.12)"/>
  <text x="48" y="64" fill="#8fe0c5" font-family="Georgia, serif" font-size="22" font-weight="700">Sit upright to eat / drink</text>
  <!-- chair -->
  <rect x="250" y="200" width="120" height="70" rx="10" fill="rgba(238,246,242,0.12)"/>
  <rect x="240" y="268" width="20" height="40" fill="rgba(238,246,242,0.2)"/>
  <rect x="360" y="268" width="20" height="40" fill="rgba(238,246,242,0.2)"/>
  <!-- person upright -->
  <circle cx="310" cy="150" r="24" fill="#f0d5a8"/>
  <rect x="286" y="174" width="48" height="80" rx="16" fill="#2f8f78"/>
  <!-- upright arrow -->
  <path d="M420 220 L420 120 L400 145 M420 120 L440 145" fill="none" stroke="#8fe0c5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="450" y="160" fill="#eef6f2" font-family="sans-serif" font-size="16">Upright</text>
  <text x="48" y="310" fill="#9bb0a8" font-family="sans-serif" font-size="15">Follow prescribed texture · never rush · watch for coughing / wet voice</text>
</svg>
