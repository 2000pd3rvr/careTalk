<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="t1">
  <title id="t1">After a fall  stay with the person and assess</title>
  <rect width="640" height="360" fill="#0f1f1c"/>
  <rect x="24" y="24" width="592" height="312" rx="18" fill="#16302a" stroke="rgba(238,246,242,0.12)"/>
  <text x="48" y="64" fill="#8fe0c5" font-family="Georgia, serif" font-size="22" font-weight="700">After a fall  assess first</text>
  <!-- floor -->
  <rect x="80" y="250" width="480" height="14" rx="4" fill="rgba(238,246,242,0.15)"/>
  <!-- person lying -->
  <ellipse cx="220" cy="236" rx="28" ry="24" fill="#f0d5a8"/>
  <rect x="248" y="220" width="150" height="36" rx="18" fill="#9bb0a8"/>
  <!-- carer kneeling -->
  <circle cx="430" cy="170" r="22" fill="#f0d5a8"/>
  <rect x="408" y="192" width="44" height="70" rx="14" fill="#2f8f78"/>
  <rect x="390" y="250" width="36" height="18" rx="8" fill="#2f8f78"/>
  <rect x="440" y="250" width="36" height="18" rx="8" fill="#2f8f78"/>
  <!-- speech -->
  <rect x="470" y="120" width="120" height="44" rx="12" fill="rgba(143,224,197,0.2)" stroke="#8fe0c5"/>
  <text x="486" y="147" fill="#eef6f2" font-family="sans-serif" font-size="14">Are you hurt?</text>
  <text x="48" y="300" fill="#9bb0a8" font-family="sans-serif" font-size="15">Stay calm · check responsiveness · look for injury · get help</text>
</svg>
